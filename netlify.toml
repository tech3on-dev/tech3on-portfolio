[build]
  command = "next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

# Official Next.js runtime — handles SSR, API routes, and dynamic
# metadata (sitemap, robots, opengraph-image, manifest) via functions.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers (mirrors next.config.ts / the old vercel.json)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/icon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
